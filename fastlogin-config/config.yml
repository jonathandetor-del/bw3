# FastLogin Configuration
# https://github.com/games647/FastLogin

# Use premium UUID for premium players instead of offline-mode UUID
premiumUuid: true

# Auto-register premium players in AuthMe (skip /register)
autoRegister: true

# Forward premium skin to client
forwardSkin: true

# Rate limit for Mojang API (max 600 per 10 minutes)
mojangRateLimit: 600

# Check name changes
nameChangeCheck: true

# Allow /premium and /cracked commands
playerCommands: true

# Seconds to wait for premium check (-1 = no timeout)
delayLogin: -1

# Debug logging
debug: true
