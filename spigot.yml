# ============================================================
# spigot.yml — Minemen-style 1.8.8 BedWars PvP
# ============================================================
config-version: 8
settings:
  save-user-cache-on-stop-only: false
  bungeecord: false
  late-bind: true
  sample-count: 12
  player-shuffle: 0
  filter-creative-items: true
  user-cache-size: 1000
  int-cache-limit: 1024
  item-dirty-ticks: 20
  # Higher threshold prevents "moved wrongly" rubberbands during custom KB
  moved-wrongly-threshold: 0.0625
  moved-too-quickly-threshold: 100.0
  timeout-time: 60
  restart-on-crash: true
  restart-script: ./start.sh
  netty-threads: 4
  attribute:
    maxHealth:
      max: 2048.0
    movementSpeed:
      max: 2048.0
    attackDamage:
      max: 2048.0
  debug: false
commands:
  tab-complete: 0
  log: true
  spam-exclusions:
  - /skill
  replace-commands:
  - setblock
  - summon
  - testforblock
  - tellraw
messages:
  whitelist: You are not whitelisted on this server!
  unknown-command: Unknown command. Type "/help" for help.
  server-full: The server is full!
  outdated-client: Outdated client! Please use 1.8.8
  outdated-server: Outdated server! I'm still on 1.8.8
  restart: Server is restarting...
stats:
  disable-saving: false
  forced-stats: {}
world-settings:
  default:
    verbose: false
    # Entity activation — tight ranges for BedWars (less processing)
    entity-activation-range:
      animals: 16
      monsters: 24
      misc: 8
    # Player tracking range — 128 blocks for smooth hit-reg at distance
    entity-tracking-range:
      players: 128
      animals: 48
      monsters: 48
      misc: 32
      other: 64
    ticks-per:
      hopper-transfer: 8
      hopper-check: 8
    hopper-amount: 1
    random-light-updates: false
    nerf-spawner-mobs: false
    mob-spawn-range: 3
    merge-radius:
      item: 2.5
      exp: 3.0
    item-despawn-rate: 6000
    growth:
      cactus-modifier: 100
      cane-modifier: 100
      melon-modifier: 100
      mushroom-modifier: 100
      pumpkin-modifier: 100
      sapling-modifier: 100
      wheat-modifier: 100
    max-tnt-per-tick: 100
    arrow-despawn-rate: 1200
    zombie-aggressive-towards-villager: false
    enable-zombie-pigmen-portal-spawns: false
    max-entity-collisions: 2
    dragon-death-sound-radius: 0
    seed-village: 10387312
    seed-feature: 14357617
    hunger:
      jump-walk-exhaustion: 0.05
      jump-sprint-exhaustion: 0.2
      combat-exhaustion: 0.1
      regen-exhaustion: 3.0
      swim-multiplier: 0.01
      sprint-multiplier: 0.1
      other-multiplier: 0.0
    # High tick time limit — prevents tile/entity skipping during combat
    max-tick-time:
      tile: 1000
      entity: 1000
