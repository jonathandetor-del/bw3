item-rotation:
  item-name: '&aRotating Items'
  menu-title: Rotating Items
  item-lore:
  - '&eClick to view!'
  info-paper:
    name: '&aWhat are Rotating Items?'
    lore:
    - '&7Rotating Items are items that'
    - '&7only available for a limited'
    - '&7amount of time. They may'
    - '&7disappear and be replaced with'
    - '&7another temporary item at any'
    - '&7time.'
  Bridge-Zapper:
    deny: '&cYou need to click on a wool block!'
  items:
    Sugarken:
      price: 20
      name: '&aSugarken'
      lore:
      - '&7Cost:&f %price% Iron '
      - ''
      - '&7A ninja''s best friend! Right'
      - '&7Click to throw.'
      - ''
      - '%BuyStatus%'
      currency: IRON_INGOT
    Super Cookie:
      price: 1
      name: '&aSuper Cookie'
      lore:
      - '&7Cost:&2 %price% Emerald'
      - ''
      - '&7Gain Speed III and Jump IV for'
      - '&715 seconds!'
      - ''
      - '%BuyStatus%'
      currency: EMERALD
    Ice Bridge:
      price: 5
      name: '&aIce Bridge'
      lore:
      - '&7Cost: &6%price% Gold'
      - ''
      - '&7Spawns a bridge of ice blocks,'
      - '&7in front of you'
      - ''
      - '%BuyStatus%'
      currency: GOLD_INGOT
    Bridge Zapper:
      price: 32
      name: '&aBridge Zapper'
      lore:
      - '&7Cost: &f%price% Iron'
      - ''
      - '&7Clicking on wool will instantly zap up'
      - '&7to 8 adjacent wool blocks!'
      - ''
      - '%BuyStatus%'
      currency: IRON_INGOT
    Festivity Mine:
      price: 10
      name: '&aFestivity Mine'
      lore:
      - '&7Cost: &6%price% Gold'
      - ''
      - '&7Spawns a mine that will blast,'
      - '&7if enemy player walks on it'
      - ''
      - '%BuyStatus%'
      currency: GOLD_INGOT
    Unicorn:
      price: 1
      name: '&aUnicorn'
      lore:
      - '&7Cost:&2 %price% Emerald'
      - ''
      - '&7Spawn a unicorn that will'
      - '&7fly for 10 seconds'
      - ''
      - '%BuyStatus%'
      currency: EMERALD
