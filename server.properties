# ============================================================
# server.properties — Minemen-style 1.8.8 BedWars PvP
# ============================================================
# Network
server-port=25565
server-ip=
# Lower compression = faster packet sending (Minemen uses 256)
network-compression-threshold=256
max-players=100
online-mode=false
prevent-proxy-connections=false
enable-query=false
enable-rcon=false

# World — lobby only, flat generation
level-name=lobby
level-type=DEFAULT
level-seed=0
generate-structures=false
allow-nether=false
allow-end=false
generator-settings=

# Gameplay — Minemen PvP tuned
difficulty=1
gamemode=0
pvp=true
hardcore=false
force-gamemode=true
spawn-protection=0
# Must be true — custom KB causes momentary "flying"
allow-flight=true
max-build-height=256
# View distance 8 — smooth PvP rendering without overloading
view-distance=8
player-idle-timeout=0
spawn-animals=false
spawn-monsters=false
spawn-npcs=true

# MOTD
motd=\u00A7b\u00A7lBISTARWARS\u00A7r \u00A78| \u00A7eBedWars\n\u00A7aPlay BedWars now!

# Misc
enable-command-block=false
op-permission-level=4
white-list=false
max-tick-time=60000
resource-pack=
resource-pack-sha1=
snooper-enabled=false
announce-player-achievements=false
max-world-size=1000
spawn-x=-33
spawn-y=71
spawn-z=1
