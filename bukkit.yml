# ============================================================
# bukkit.yml — Minemen-style 1.8.8 BedWars PvP
# ============================================================
settings:
  allow-end: false
  warn-on-overload: true
  permissions-file: permissions.yml
  update-folder: update
  plugin-profiling: false
  # Low throttle = faster reconnects (Minemen allows fast rejoin)
  connection-throttle: 0
  query-plugins: false
  deprecated-verbose: false
  shutdown-message: '&cServer is restarting...'
spawn-limits:
  monsters: 0
  animals: 0
  water-animals: 0
  ambient: 0
chunk-gc:
  period-in-ticks: 400
ticks-per:
  animal-spawns: 9999999
  monster-spawns: 9999999
  autosave: 3000

worlds: {}
