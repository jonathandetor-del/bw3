# AuthMe Configuration for BedWars Server
# Minimal config — FastLogin handles premium auth, AuthMe is fallback only
DataSource:
  backend: SQLITE

settings:
  sessions:
    enabled: true
    timeout: 43200
  registration:
    enabled: true
    force: false
  forceLogin: false
  restrictions:
    allowedNicknameCharacters: '[a-zA-Z0-9_]*'
    maxLoginPerIp: 0
    maxRegPerIp: 0
    timeout: 300
    allowMovement: true
    allowCommands:
      - /login
      - /register
      - /l
      - /reg
      - /premium
      - /cracked
  GameMode:
    ForceSurvivalMode: false
  security:
    minPasswordLength: 4
    passwordMaxLength: 30
    unsafePasswords:
      - '123456'
      - 'password'
  useAsyncTasks: true

Hooks:
  linkToEssentials: false
  disableSocialSpy: false

Converter:
  CrazyLogin:
    fileName: accounts.db
