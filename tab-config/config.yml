# https://github.com/NEZNAMY/TAB/wiki/Feature-guide:-Header-&-Footer
header-footer:
  enabled: false
  header:
  - <#FFFFFF>&m                                                </#FFFF00>
  - '&3&lServer name'
  - '&r&7&l>> %animation:Welcome%&3 &l%player%&7&l! &7&l<<'
  - '&r&7Online players: &f%online%'
  - '&6Online staff: &e%staffonline%'
  - ''
  footer:
  - '%animation:time%'
  - '&2Ping: %ping%'
  - '&7&l Used memory: %memory-used% MB / %memory-max% MB'
  - ''
  - '&r&7Visit our webpage %animation:web%'
  - <#FFFFFF>&m                                                </#FFFF00>
  disable-condition: '%world%=disabledworld'
  per-world:
    world1:
      header:
      - an example of world with custom
      footer:
      - header/footer and prefix/suffix
    world2;world3:
      header:
      - This is a shared header for
      - world2 and world3
  per-server:
    server1:
      header:
      - an example of server with custom header
tablist-name-formatting:
  enabled: true
  anti-override: true
  disable-condition: '%world%=disabledworld'
scoreboard-teams:
  enabled: true
  enable-collision: '%world%=world'
  invisible-nametags: false
  anti-override: true
  sorting-types:
  - PLACEHOLDER_A_TO_Z:%bw1058plus_team_letter%
  - GROUPS:R,B,G,Y,A,W,P,G,RED,BLUE,GREEN,YELLOW,AQUA,,WHITE,PINK,GRAY,red,blue,green,yellow,aqua,white,pink,gray,[SPEC],[SPECTATOR],SPEC,SPECTATOR,spec,spectator,owner,admin,dev,mod,helper,famous,yt,mvp+,mvp,vip+,vip,default,none
  case-sensitive-sorting: true
  can-see-friendly-invisibles: true
  disable-condition: '%world%=disabledworld'
  unlimited-nametag-mode:
    enabled: false
playerlist-objective:
  enabled: false
  value: '%ping%'
  fancy-value: '&7Ping: %ping%'
  title: TAB
  render-type: INTEGER
  disable-condition: '%world%=disabledworld'
belowname-objective:
  enabled: false
  value: '%health%'
  title: '&cHealth'
  fancy-value: '&c%health%'
  fancy-value-default: NPC
  disable-condition: '%world%=disabledworld'
  fancy-display-default: NPC
  fancy-display-players: '&c%health%'
prevent-spectator-effect:
  enabled: false
bossbar:
  enabled: true
  bars:
    bedwars_bar:
      display-condition: permission:tab.bossbar.bedwars
      style: PROGRESS
      color: PINK
      progress: 100
      text: '%animation:bedwars%'
    waiting_bar:
      # This is the condition that must be met
      display-condition: "%bw1058_player_status%=WAITING"
      announcement-bar: false
      color: PINK
      style: PROGRESS
      progress: 100
      text: "%animation:bedwars%"
  toggle-command: /bossbar
  hidden-by-default: false
  remember-toggle-choice: true
scoreboard:
  enabled: false
  toggle-command: /sb
  remember-toggle-choice: false
  hidden-by-default: false
  use-numbers: true
  static-number: 0
  delay-on-join-milliseconds: 0
  scoreboards:
    scoreboard-1.20.3+:
      title: <#E0B11E>MyServer</#FF0000>
      display-condition: '%player-version-id%>=765;%bedrock%=false'
      lines:
      - '&7%date%'
      - '%animation:MyAnimation1%'
      - '&6Online:'
      - '* &eOnline&7:||%online%'
      - '* &eCurrent World&7:||%worldonline%'
      - '* &eStaff&7:||%staffonline%'
      - ''
      - '&6Personal Info:'
      - '* &bRank&7:||%group%'
      - '* &bPing&7:||%ping%&8ms'
      - '* &bWorld&7:||%world%'
      - '%animation:MyAnimation1%'
    scoreboard:
      title: <#E0B11E>MyServer</#FF0000>
      lines:
      - '&7%date%'
      - '%animation:MyAnimation1%'
      - '&6Online:'
      - '* &eOnline&7: &f%online%'
      - '* &eCurrent World&7: &f%worldonline%'
      - '* &eStaff&7: &f%staffonline%'
      - ''
      - '&6Personal Info:'
      - '* &bRank&7: &f%group%'
      - '* &bPing&7: &f%ping%&8ms'
      - '* &bWorld&7: &f%world%'
      - '%animation:MyAnimation1%'
layout:
  enabled: false
  direction: COLUMNS
  default-skin: mineskin:383747683
  enable-remaining-players-text: true
  remaining-players-text: '... and %s more'
  empty-slot-ping-value: 1000
  layouts:
    default:
      fixed-slots:
      - '1|&3Website&f:'
      - 2|&bmyserver.net
      - '3|&8&m                       '
      - '4|&3Name&f:'
      - 5|&b%player%
      - '7|&3Rank&f:'
      - '8|Rank: %group%'
      - '10|&3World&f:'
      - 11|&b%world%
      - '13|&3Time&f:'
      - 14|&b%time%
      - '21|&3Teamspeak&f:'
      - 22|&bts.myserver.net
      - '23|&8&m                       '
      - '41|&3Store&f:'
      - 42|&bshop.myserver.net
      - '43|&8&m                       '
      groups:
        staff:
          condition: permission:tab.staff
          slots:
          - 24-40
        players:
          slots:
          - 44-80
ping-spoof:
  enabled: false
  value: 0
placeholders:
  date-format: dd.MM.yyyy
  time-format: '[HH:mm:ss / h:mm a]'
  time-offset: 0
  register-tab-expansion: false
placeholder-output-replacements:
  '%essentials_vanished%':
    'yes': '&7| Vanished'
    'no': ''
conditions:
  RankOrTeam:
    conditions:
    - '%bw1058_player_status%=NONE'
    - '%bw1058_player_status%=WAITING'
    type: OR
    true: '%bw1058plus_team_color%&l%bw1058plus_team_letter%%bw1058plus_team_color%&7'
    false: '%condition:RankOrTeam1%'
  RankOrTeam1:
    conditions:
    - '%bw1058_player_status%=PLAYING'
    true: '%bw1058plus_team_color%&l%bw1058plus_team_letter%%bw1058plus_team_color% '
    false: '%condition:RankOrTeam2%'
  RankOrTeam2:
    conditions:
    - '%bw1058_player_status%=SPECTATING'
    true: '&7[SPEC] &7'
    false: '%condition:RankOrTeam3%'
  RankOrTeam3:
    conditions:
    - '%bw1058_player_status%=RESTARTING'
    true: '&7%bw1058plus_team_color%&l%bw1058plus_team_letter%%bw1058plus_team_color%
      &r%bw1058plus_team_color%'
    false: '&4ERROR IN TAB/config.yml'
placeholder-refresh-intervals:
  default-refresh-interval: 500
  '%server_uptime%': 1000
  '%server_tps_1_colored%': 1000
  '%server_unique_joins%': 5000
  '%player_health%': 200
  '%player_ping%': 1000
  '%vault_prefix%': 1000
  '%rel_factionsuuid_relation_color%': 1000
assign-groups-by-permissions: false
primary-group-finding-list:
- Owner
- Admin
- Mod
- Helper
- default
permission-refresh-interval: 1000
debug: false
mysql:
  enabled: false
  host: 127.0.0.1
  port: 3306
  database: tab
  username: user
  password: password
  useSSL: true
proxy-support:
  enabled: true
  type: PLUGIN
  plugin:
    name: RedisBungee
  redis:
    url: redis://:password@localhost:6379/0
  rabbitmq:
    exchange: plugin
    url: amqp://guest:guest@localhost:5672/%2F
per-world-playerlist:
  enabled: true
  allow-bypass-permission: false
  ignore-effect-in-worlds:
  - ignoredworld
  - build
  shared-playerlist-world-groups:
    lobby:
    - lobby1
    - lobby2
    minigames:
    - paintball
    - bedwars
compensate-for-packetevents-bug: false
global-playerlist:
  enabled: false
  display-others-as-spectators: false
  display-vanished-players-as-spectators: true
  isolate-unlisted-servers: false
  spy-servers:
  - spyserver1
  - spyserver2
  server-groups:
    lobbies:
    - lobby1
    - lobby2
    group2:
    - server1
    - server2
use-bukkit-permissions-manager: false
use-online-uuid-in-tablist: true
