# ============================================================
# Railway deployment configuration
# ============================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1

# Persistent volume — survives redeployments so plugins, configs,
# worlds, and databases are preserved across container rebuilds.
[deploy.volumes]
"/data" = "bedwars-data"

# Port Configuration
[[services.ports]]
name = "minecraft"
port = 25565
protocol = "TCP"

[[services.ports]]
name = "filebrowser"
port = 8080
protocol = "TCP"

[[services.ports]]
name = "rcon"
port = 25575
protocol = "TCP"

# Environment Variables
[env]
# Minecraft Server Configuration
MINECRAFT_PORT = "25565"
MEMORY = "20G"
TZ = "Asia/Singapore"

# File Manager Configuration (FileBrowser)
FILE_MANAGER_PORT = "8081"
FILE_MANAGER_USERNAME = "admin"
FILE_MANAGER_PASSWORD = "adminadmin123"
FILE_MANAGER_DB = "/data/.filebrowser.db"
